services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_CLIENT_TOKEN: ${NEXT_PUBLIC_CLIENT_TOKEN}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-production}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    image: oliveto-web:latest
    container_name: oliveto_web
    environment:
      NODE_ENV: production
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://oliveto_api:8080}
    restart: unless-stopped
    networks:
      - oliveto
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.docker.network=oliveto
      # router dedicado do front
      - traefik.http.routers.oliveto-web.rule=Host(`olivetocontabilidade.com`) || Host(`www.olivetocontabilidade.com`)
      - traefik.http.routers.oliveto-web.entrypoints=websecure
      - traefik.http.routers.oliveto-web.tls.certresolver=letsencrypt
      - traefik.http.services.oliveto-web.loadbalancer.server.port=3000
      # redireciona www → apex
      - traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\.olivetocontabilidade\.com/(.*)
      - traefik.http.middlewares.www-redirect.redirectregex.replacement=https://olivetocontabilidade.com/$${1}
      - traefik.http.middlewares.www-redirect.redirectregex.permanent=true
      # headers de segurança
      - traefik.http.middlewares.oliveto-web-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.oliveto-web-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.oliveto-web-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.oliveto-web-headers.headers.browserXssFilter=true
      - traefik.http.routers.oliveto-web.middlewares=www-redirect,oliveto-web-headers
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  oliveto:
    name: oliveto
    driver: bridge          # o front é o dono da rede; a API entra como external