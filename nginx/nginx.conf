upstream nextjs {
    server app:3000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name olivetocontabilidade.com www.olivetocontabilidade.com;

    # ── SSL certificates (managed by Certbot) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/olivetocontabilidade.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/olivetocontabilidade.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers (Next.js adds its own via next.config) ────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/oliveto.access.log;
    error_log  /var/log/nginx/oliveto.error.log warn;

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml;

    # ── Static Next.js assets — long-lived cache ───────────────────────────
    location /_next/static/ {
        proxy_pass         http://nextjs;
        proxy_cache_valid  200 1y;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Public static files ────────────────────────────────────────────────
    location /public/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Everything else → Next.js ──────────────────────────────────────────
    location / {
        proxy_pass              http://nextjs;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        "upgrade";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      60s;
        proxy_connect_timeout   10s;
    }
}
